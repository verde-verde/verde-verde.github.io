<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 미리보기 — Verde Verde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'f1'; src: url('Fonts/Pak_Yong_jun.otf');        font-weight: 400; }
    @font-face { font-family: 'f2'; src: url('Fonts/온글잎 의연체.ttf');        font-weight: 400; }
    @font-face { font-family: 'f3'; src: url('Fonts/온글잎 영롱.ttf');          font-weight: 400; }
    @font-face { font-family: 'f4'; src: url('Fonts/Chilgok_lws.otf');         font-weight: 400; }
    @font-face { font-family: 'f5'; src: url('Fonts/온글잎 공부잘하자나.ttf'); font-weight: 400; }
    @font-face { font-family: 'f6'; src: url('Fonts/Yeongdeok Sea.otf');       font-weight: 400; }
    @font-face { font-family: 'f7'; src: url('Fonts/강원교육모두 Bold.otf');   font-weight: 700; }
    @font-face { font-family: 'f8'; src: url('Fonts/CookieRun Bold.ttf');      font-weight: 700; }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #22ac38;
      --dark:  #212121;
      --gray:  #888;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── 전체 컨테이너 ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 상단 그라디언트 영역 ── */
    .hero {
      width: 100%;
      background: linear-gradient(180deg, #c8e0ec 0%, #deeef6 55%, #ffffff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 2.5rem;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--green);
      letter-spacing: -0.01em;
      margin-bottom: 0.6rem;
    }

    .hero p {
      font-size: 1rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    /* ── 입력창 ── */
    .input-wrap {
      width: 100%;
      max-width: 540px;
    }

    .main-input {
      width: 100%;
      padding: 1rem 1.4rem;
      border: 1.5px solid #ccc;
      border-radius: 10px;
      font-size: 1.05rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--dark);
      outline: none;
      background: #fff;
      transition: border-color .2s;
    }
    .main-input:focus { border-color: var(--green); }
    .main-input::placeholder { color: #bbb; }

    /* ── 안내 문구 ── */
    .notice {
      width: 100%;
      max-width: 540px;
      padding: 1.6rem 0 0.4rem;
      text-align: center;
      font-size: 0.82rem;
      color: #999;
      line-height: 1.9;
    }
    .notice em { font-style: normal; color: var(--green); font-weight: 700; }

    /* ── 폰트 리스트 ── */
    .font-list {
      width: 100%;
      max-width: 540px;
      padding: 1rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .font-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .font-num {
      font-size: 1rem;
      color: #aaa;
      min-width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .font-pill {
      width: 25mm;
      height: 12mm;
      flex-shrink: 0;
      padding: 0;
      border: 1.5px solid #ddd;
      border-radius: 999px;
      background: #fff;
      font-size: 1.2rem;
      color: var(--dark);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      white-space: nowrap;
      line-height: 1.4;
      transition: border-color .2s;
    }
    .font-pill:hover { border-color: #bbb; }

    /* ── 하단 푸터 ── */
    .page-footer {
      width: 100%;
      max-width: 540px;
      padding: 2.5rem 1.5rem 3rem;
      text-align: center;
    }

    .page-footer p {
      font-size: 0.8rem;
      color: #bbb;
      margin-bottom: 1rem;
    }

    .footer-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: var(--green);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      text-align: center;
      border-radius: 10px;
      text-decoration: none;
      transition: background .2s;
    }
    .footer-btn:hover { background: #1d9430; }
    .footer-btn:active { background: #187a28; }

    /* ── 데스크탑 확장 ── */
    @media (min-width: 680px) {
      .hero { padding: 5rem 2rem 3rem; }
      .hero h1 { font-size: 3rem; }
      .hero p { font-size: 1.05rem; }

      .main-input { padding: 1.1rem 1.6rem; font-size: 1.1rem; }

      .font-list { max-width: 600px; gap: 1.2rem; }
      .input-wrap { max-width: 600px; }
      .notice { max-width: 600px; }
      .page-footer { max-width: 600px; }

      .font-num { font-size: 1.05rem; min-width: 44px; }
      .font-pill { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="hero">
    <h1>폰트 미리보기</h1>
    <p>제작을 원하는 폰트를 미리 보실 수 있습니다</p>
    <div class="input-wrap">
      <input class="main-input" id="main-input" type="text" placeholder="테스트 텍스트를 적어주세요">
    </div>
  </div>

  <div class="notice">
    폰트 종류에 따라 동일한 글자 크기로 제작하더라도<br>
    <em>글자마다 높낮이가 다르거나 수평이 맞지 않는 특성</em>이 있으며,<br>
    불량이 아닌 점 참고 부탁드립니다.
  </div>

  <div class="font-list" id="font-list"></div>

  <div class="page-footer">
    <p>폰트 선택이 어려우시다면, 빠르고 쉽게 알려드릴게요!</p>
    <a class="footer-btn" href="https://www.verdeverde-design.com/32/?q=YToxOntzOjEyOiJrZXl3b3JkX3R5cGUiO3M6MzoiYWxsIjt9&bmode=view&idx=13162917&t=board" target="_blank" rel="noopener">폰트 선택 가이드 보러가기</a>
  </div>

</div>

<script>
  const FONTS = [
    { family: "'f1', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f2', sans-serif", weight: 400 },
    { family: "'f3', sans-serif", weight: 400 },
    { family: "'f4', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f5', sans-serif", weight: 400, stroke: { color: '#fff', width: '0.3pt' } },
    { family: "'f6', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f7', sans-serif", weight: 700, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f8', sans-serif", weight: 700 },
  ];

  const DEFAULT = '가나다라마바사';
  const list = document.getElementById('font-list');
  const pills = [];

  FONTS.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'font-row';

    const num = document.createElement('span');
    num.className = 'font-num';
    num.textContent = (i + 1) + '번';

    const pill = document.createElement('div');
    pill.className = 'font-pill';
    pill.style.fontFamily  = f.family;
    pill.style.fontWeight  = f.weight;
    if (f.stroke) pill.style.webkitTextStroke = f.stroke.width + ' ' + f.stroke.color;
    const inner = document.createElement('span');
    inner.textContent = DEFAULT;
    pill.appendChild(inner);

    row.appendChild(num);
    row.appendChild(pill);
    list.appendChild(row);
    fitPill(pill);
    pills.push(pill);
  });

  function fitPill(pill) {
    const inner = pill.querySelector('span');
    const maxPx = 30, minPx = 5;
    let size = maxPx;
    pill.style.fontSize = size + 'px';
    while (size > minPx && (inner.offsetWidth > pill.clientWidth || inner.offsetHeight > pill.clientHeight)) {
      size -= 0.5;
      pill.style.fontSize = size + 'px';
    }
  }

  document.getElementById('main-input').addEventListener('input', function () {
    const t = this.value.trim() || DEFAULT;
    pills.forEach(p => {
      p.querySelector('span').textContent = t;
      fitPill(p);
    });
  });
</script>

</body>
</html>
