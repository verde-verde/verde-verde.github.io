<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 테스트 — Verde Verde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ── Local fonts ── */
    @font-face { font-family: '박용준투사회보'; src: url('Fonts/Pak_Yong_jun.otf');          font-weight: 400; }
    @font-face { font-family: '의연체';        src: url('Fonts/온글잎 의연체.ttf');           font-weight: 400; }
    @font-face { font-family: '영롱체';        src: url('Fonts/온글잎 영롱.ttf');             font-weight: 400; }
    @font-face { font-family: '이원순체';      src: url('Fonts/Chilgok_lws.otf');            font-weight: 400; }
    @font-face { font-family: '공부잘하자나';  src: url('Fonts/온글잎 공부잘하자나.ttf');     font-weight: 400; }
    @font-face { font-family: '영덕바다체';    src: url('Fonts/Yeongdeok Sea.otf');          font-weight: 400; }
    @font-face { font-family: '강원교육모두';  src: url('Fonts/강원교육모두 Bold.otf');       font-weight: 700; }
    @font-face { font-family: '쿠키런';        src: url('Fonts/CookieRun Bold.ttf');         font-weight: 700; }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:   #22ac38;
      --dark:    #212121;
      --gray:    #888;
      --border:  #e8e8e8;
      --bg:      #f5f5f5;
      --card-bg: #ffffff;
      --header-h: 56px;
      --ctrl-h:   56px;
    }

    body {
      font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ══════════════════════════════
       DESKTOP
    ══════════════════════════════ */

    /* ── Header ── */
    .site-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 2rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--dark);
      text-decoration: none;
    }
    .logo span { color: var(--green); }

    .header-sep { width: 1px; height: 16px; background: var(--border); }

    .header-title { font-size: 0.82rem; font-weight: 700; color: var(--gray); }

    /* ── Control bar ── */
    .ctrl-bar {
      height: var(--ctrl-h);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0 2rem;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-h);
      z-index: 20;
    }

    /* 텍스트 입력 */
    .ctrl-input-wrap {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    .ctrl-input {
      width: 100%;
      padding: 0.48rem 2.2rem 0.48rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 0.88rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--dark);
      outline: none;
      background: #fff;
      transition: border-color .2s;
    }
    .ctrl-input:focus { border-color: var(--green); }
    .ctrl-input::placeholder { color: #bbb; }

    .ctrl-input-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      pointer-events: none;
    }

    /* 크기 ─/+ */
    .ctrl-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .ctrl-label { font-size: 0.78rem; color: var(--gray); white-space: nowrap; flex-shrink: 0; }

    .size-control { display: flex; align-items: center; }

    .size-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--dark);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .size-btn:first-child { border-radius: 999px 0 0 999px; }
    .size-btn:last-child  { border-radius: 0 999px 999px 0; border-left: none; }
    .size-btn:hover { background: #f0f0f0; border-color: #ccc; }

    .size-input {
      width: 52px;
      height: 32px;
      border: 1px solid var(--border);
      border-left: none;
      border-right: none;
      text-align: center;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--dark);
      background: #fafafa;
      outline: none;
      -moz-appearance: textfield;
    }
    .size-input::-webkit-outer-spin-button,
    .size-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ── Card grid ── */
    .cards-wrap {
      padding: 1.8rem 2rem 3rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 1400px;
    }

    /* ── Font card ── */
    .font-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow .25s ease, border-color .25s ease;
      cursor: default;
    }

    .font-card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,0.09);
      border-color: #d0d0d0;
    }

    /* 카드 헤더 */
    .card-head {
      padding: 0.85rem 1.1rem 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--gray);
      flex-shrink: 0;
    }

    .card-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--dark);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      border: 1px solid;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .card-badge.black { color: #555; border-color: #ccc; background: #f5f5f5; }
    .card-badge.white { color: #888; border-color: #ddd; background: #f9f9f9; }

    /* 구분선 */
    .card-divider {
      height: 1px;
      background: var(--border);
      transition: background .25s;
    }
    .font-card:hover .card-divider { background: var(--green); }

    /* 프리뷰 텍스트 */
    .card-preview {
      flex: 1;
      padding: 1rem 1.1rem;
      min-height: 110px;
      overflow: hidden;
    }

    .card-text {
      width: 100%;
      height: 100%;
      min-height: 90px;
      outline: none;
      border: none;
      resize: none;
      background: transparent;
      font-size: 30px;
      line-height: 1.4;
      color: var(--dark);
      word-break: break-all;
      overflow: hidden;
    }

    /* ══════════════════════════════
       MOBILE
    ══════════════════════════════ */

    .mobile-view { display: none; }

    @media (max-width: 680px) {
      .site-header { display: none; }
      .desktop-view { display: none; }

      body { background: #fff; }

      .mobile-view {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .mv-hero {
        background: linear-gradient(180deg, #c8e0ec 0%, #e8f4f9 60%, #ffffff 100%);
        padding: 3rem 1.5rem 2rem;
        text-align: center;
      }

      .mv-hero h1 {
        font-size: 2rem;
        font-weight: 900;
        color: var(--green);
        letter-spacing: -0.01em;
        margin-bottom: 0.6rem;
        font-family: 'Noto Sans KR', sans-serif;
      }

      .mv-hero p {
        font-size: 0.95rem;
        color: #666;
        font-family: 'Noto Sans KR', sans-serif;
        line-height: 1.6;
      }

      .mv-input-wrap {
        padding: 0 1.5rem 1.5rem;
        background: linear-gradient(180deg, #e8f4f9 0%, #ffffff 100%);
      }

      .mv-input {
        width: 100%;
        padding: 1rem 1.2rem;
        border: 1.5px solid #d0d0d0;
        border-radius: 8px;
        font-size: 1rem;
        font-family: 'Noto Sans KR', sans-serif;
        color: var(--dark);
        outline: none;
        background: #fff;
        transition: border-color .2s;
      }
      .mv-input:focus { border-color: var(--green); }
      .mv-input::placeholder { color: #bbb; }

      .mv-notice {
        padding: 1.2rem 2rem 1.5rem;
        text-align: center;
        font-size: 0.8rem;
        color: #888;
        line-height: 1.8;
        font-family: 'Noto Sans KR', sans-serif;
      }
      .mv-notice em { font-style: normal; color: var(--green); font-weight: 700; }

      .mv-list {
        padding: 0.5rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        flex: 1;
      }

      .mv-row { display: flex; align-items: center; gap: 1rem; }

      .mv-num {
        font-size: 1rem;
        color: #888;
        font-family: 'Noto Sans KR', sans-serif;
        min-width: 42px;
        text-align: right;
        flex-shrink: 0;
      }

      .mv-pill {
        flex: 1;
        padding: 0.7rem 1.4rem;
        border: 1.5px solid #d8d8d8;
        border-radius: 50px;
        background: #fff;
        font-size: 1.15rem;
        color: var(--dark);
        text-align: center;
        min-height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-all;
        line-height: 1.4;
      }

      .mv-footer {
        padding: 2.5rem 1.5rem;
        text-align: center;
      }

      .mv-footer p {
        font-size: 0.8rem;
        color: #aaa;
        margin-bottom: 0.9rem;
        font-family: 'Noto Sans KR', sans-serif;
      }

      .mv-footer a {
        display: block;
        width: 100%;
        padding: 1rem;
        background: var(--green);
        color: #fff;
        font-size: 1.05rem;
        font-weight: 700;
        font-family: 'Noto Sans KR', sans-serif;
        text-align: center;
        border-radius: 8px;
        text-decoration: none;
      }
    }
  </style>
</head>
<body>

<!-- ══ DESKTOP ══ -->
<header class="site-header">
  <a class="logo" href="index.html">verde<span>.</span>verde</a>
  <div class="header-sep"></div>
  <span class="header-title">폰트 미리보기</span>
</header>

<div class="desktop-view">

  <!-- 컨트롤 바 -->
  <div class="ctrl-bar">
    <div class="ctrl-input-wrap">
      <input class="ctrl-input" id="dt-input" type="text" placeholder="문구를 입력하고 폰트를 미리보세요">
      <svg class="ctrl-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </div>

    <div class="ctrl-sep"></div>

    <span class="ctrl-label">크기</span>
    <div class="size-control">
      <button class="size-btn" id="dt-size-minus" type="button">−</button>
      <input class="size-input" id="dt-size" type="number" value="30" min="10" max="120">
      <button class="size-btn" id="dt-size-plus" type="button">+</button>
    </div>
  </div>

  <!-- 카드 그리드 -->
  <div class="cards-wrap">
    <div class="cards-grid" id="dt-grid"></div>
  </div>

</div>

<!-- ══ MOBILE ══ -->
<div class="mobile-view">

  <div class="mv-hero">
    <h1>폰트 미리보기</h1>
    <p>제작을 원하는 폰트를<br>미리 보실 수 있습니다</p>
  </div>

  <div class="mv-input-wrap">
    <input class="mv-input" id="mv-input" type="text" placeholder="테스트 텍스트를 적어주세요">
  </div>

  <div class="mv-notice">
    폰트 종류에 따라 동일한 글자 크기로 제작 하더라도<br>
    <em>글자마다 높낮이가 다르거나 수평이 맞지 않는 특성</em>이 있으며,<br>
    불량이 아닌 점 참고 부탁드립니다.
  </div>

  <div class="mv-list" id="mv-list"></div>

  <div class="mv-footer">
    <p>폰트 선택이 어려우시다면, 빠르고 쉽게 알려드릴게요!</p>
    <a href="index.html">폰트 선택 가이드 보러가기</a>
  </div>

</div>

<script>
  /* ── 폰트 목록 ── */
  const FONTS = [
    { name: '박용준투사회보', family: "'박용준투사회보', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { name: '의연체',        family: "'의연체', sans-serif",         weight: 400 },
    { name: '영롱체',        family: "'영롱체', sans-serif",         weight: 400 },
    { name: '이원순체',      family: "'이원순체', sans-serif",       weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { name: '공부잘하자나',  family: "'공부잘하자나', sans-serif",   weight: 400, stroke: { color: '#fff', width: '0.3pt' } },
    { name: '영덕바다체',    family: "'영덕바다체', sans-serif",     weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { name: '강원교육모두',  family: "'강원교육모두', sans-serif",   weight: 700, stroke: { color: '#000', width: '0.2pt' } },
    { name: '쿠키런',        family: "'쿠키런', sans-serif",         weight: 700 },
  ];

  const DEFAULT_TEXT = '가나다라마바사';

  /* ══ DESKTOP ══ */
  const dtGrid   = document.getElementById('dt-grid');
  const dtInput  = document.getElementById('dt-input');
  const dtSizeEl = document.getElementById('dt-size');
  let dtSize = 30;

  // 카드 생성
  const cardTexts = [];
  FONTS.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'font-card';

    // 테두리 뱃지
    let badgeHtml = '';
    if (f.stroke) {
      const cls   = f.stroke.color === '#fff' ? 'white' : 'black';
      const label = f.stroke.color === '#fff' ? `흰테두리 ${f.stroke.width}` : `검정테두리 ${f.stroke.width}`;
      badgeHtml = `<span class="card-badge ${cls}">${label}</span>`;
    }

    card.innerHTML = `
      <div class="card-head">
        <span class="card-num">${i + 1}번</span>
        <span class="card-name">${f.name}</span>
        ${badgeHtml}
      </div>
      <div class="card-divider"></div>
      <div class="card-preview">
        <div class="card-text"
             contenteditable="true"
             spellcheck="false"
             data-idx="${i}"></div>
      </div>`;

    dtGrid.appendChild(card);

    const textEl = card.querySelector('.card-text');
    textEl.style.fontFamily  = f.family;
    textEl.style.fontWeight  = f.weight;
    if (f.stroke) textEl.style.webkitTextStroke = f.stroke.width + ' ' + f.stroke.color;
    textEl.textContent = DEFAULT_TEXT;
    cardTexts.push(textEl);

    // 개별 편집 시 글로벌 입력과 동기화 해제
    textEl.addEventListener('input', () => {});
  });

  function applyTextToAll(text) {
    const t = text || DEFAULT_TEXT;
    cardTexts.forEach(el => { el.textContent = t; });
  }

  function applySizeToAll(size) {
    cardTexts.forEach(el => { el.style.fontSize = size + 'px'; });
  }

  dtInput.addEventListener('input', () => applyTextToAll(dtInput.value));

  dtSizeEl.addEventListener('change', () => {
    dtSize = Math.min(120, Math.max(10, parseInt(dtSizeEl.value) || 30));
    dtSizeEl.value = dtSize;
    applySizeToAll(dtSize);
  });

  document.getElementById('dt-size-minus').addEventListener('click', () => {
    dtSize = Math.max(10, dtSize - 2);
    dtSizeEl.value = dtSize;
    applySizeToAll(dtSize);
  });

  document.getElementById('dt-size-plus').addEventListener('click', () => {
    dtSize = Math.min(120, dtSize + 2);
    dtSizeEl.value = dtSize;
    applySizeToAll(dtSize);
  });

  applySizeToAll(dtSize);

  /* ══ MOBILE ══ */
  const mvList  = document.getElementById('mv-list');
  const mvInput = document.getElementById('mv-input');

  FONTS.forEach((f, i) => {
    const row  = document.createElement('div');
    row.className = 'mv-row';

    const num  = document.createElement('span');
    num.className = 'mv-num';
    num.textContent = (i + 1) + '번';

    const pill = document.createElement('div');
    pill.className = 'mv-pill';
    pill.style.fontFamily  = f.family;
    pill.style.fontWeight  = f.weight;
    if (f.stroke) pill.style.webkitTextStroke = f.stroke.width + ' ' + f.stroke.color;
    pill.textContent = DEFAULT_TEXT;

    row.appendChild(num);
    row.appendChild(pill);
    mvList.appendChild(row);
  });

  mvInput.addEventListener('input', () => {
    const t = mvInput.value.trim() || DEFAULT_TEXT;
    document.querySelectorAll('.mv-pill').forEach(p => { p.textContent = t; });
  });
</script>

</body>
</html>
