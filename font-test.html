<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 미리보기 — Verde Verde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'f1'; src: url('Fonts/Pak_Yong_jun.otf');        font-weight: 400; }
    @font-face { font-family: 'f2'; src: url('Fonts/온글잎 의연체.ttf');        font-weight: 400; }
    @font-face { font-family: 'f3'; src: url('Fonts/온글잎 영롱.ttf');          font-weight: 400; }
    @font-face { font-family: 'f4'; src: url('Fonts/Chilgok_lws.otf');         font-weight: 400; }
    @font-face { font-family: 'f5'; src: url('Fonts/온글잎 공부잘하자나.ttf'); font-weight: 400; }
    @font-face { font-family: 'f6'; src: url('Fonts/Yeongdeok Sea.otf');       font-weight: 400; }
    @font-face { font-family: 'f7'; src: url('Fonts/강원교육모두 Bold.otf');   font-weight: 700; }
    @font-face { font-family: 'f8'; src: url('Fonts/CookieRun Bold.ttf');      font-weight: 700; }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:  #22ac38;
      --dark:   #212121;
      --gray:   #888;
      --border: #e8e8e8;
      --bg:     #f5f5f5;
      --card:   #ffffff;
      --hh: 56px;
      --ch: 56px;
    }

    body {
      font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      height: var(--hh);
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0 1.5rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--dark);
      text-decoration: none;
      white-space: nowrap;
    }
    .logo span { color: var(--green); }

    .header-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
    .header-title { font-size: 0.8rem; font-weight: 700; color: var(--gray); white-space: nowrap; }

    /* ── Control bar ── */
    .ctrl-bar {
      height: var(--ch);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0 1.5rem;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--hh);
      z-index: 20;
    }

    .ctrl-input-wrap {
      position: relative;
      flex: 1;
    }

    .ctrl-input {
      width: 100%;
      padding: 0.45rem 2.2rem 0.45rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 0.88rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--dark);
      outline: none;
      background: #fff;
      transition: border-color .2s;
    }
    .ctrl-input:focus { border-color: var(--green); }
    .ctrl-input::placeholder { color: #bbb; }

    .ctrl-input-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      pointer-events: none;
    }

    .ctrl-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .ctrl-label { font-size: 0.78rem; color: var(--gray); white-space: nowrap; flex-shrink: 0; }

    .size-control { display: flex; align-items: center; flex-shrink: 0; }

    .size-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--dark);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
      user-select: none;
    }
    .size-btn:first-child { border-radius: 999px 0 0 999px; }
    .size-btn:last-child  { border-radius: 0 999px 999px 0; border-left: none; }
    .size-btn:hover { background: #f0f0f0; }
    .size-btn:active { background: #e8e8e8; }

    .size-input {
      width: 44px;
      height: 30px;
      border: 1px solid var(--border);
      border-left: none;
      border-right: none;
      text-align: center;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--dark);
      background: #fafafa;
      outline: none;
      -moz-appearance: textfield;
    }
    .size-input::-webkit-outer-spin-button,
    .size-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ── Card grid ── */
    .cards-wrap {
      padding: 1.4rem 1.5rem 3rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.9rem;
      max-width: 1400px;
    }

    /* ── Font card ── */
    .font-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow .25s ease, border-color .25s ease;
    }
    .font-card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,0.09);
      border-color: #d0d0d0;
    }

    .card-head {
      padding: 0.8rem 1rem 0.65rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-num {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--dark);
    }

    .card-badge {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.12rem 0.4rem;
      border-radius: 2px;
      border: 1px solid #ccc;
      color: #666;
      background: #f5f5f5;
      flex-shrink: 0;
    }

    .card-divider { height: 1px; background: var(--border); transition: background .25s; }
    .font-card:hover .card-divider { background: var(--green); }

    .card-preview {
      flex: 1;
      padding: 1rem;
      min-height: 100px;
    }

    .card-text {
      width: 100%;
      min-height: 80px;
      outline: none;
      border: none;
      resize: none;
      background: transparent;
      line-height: 1.4;
      color: var(--dark);
      word-break: break-all;
      overflow: hidden;
      display: block;
    }

    /* ── Notice + Footer (모바일 하단) ── */
    .page-footer {
      display: none;
    }

    /* ── Mobile overrides ── */
    @media (max-width: 560px) {
      :root { --hh: 50px; --ch: 50px; }

      .site-header { padding: 0 1rem; gap: 0.6rem; }
      .logo { font-size: 0.88rem; }
      .header-title { display: none; }
      .header-sep { display: none; }

      .ctrl-bar { padding: 0 1rem; gap: 0.5rem; }
      .ctrl-label { display: none; }
      .ctrl-sep { display: none; }

      .cards-wrap { padding: 1rem 1rem 1rem; }
      .cards-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .card-head { padding: 0.75rem 0.9rem 0.6rem; }
      .card-preview { padding: 0.9rem; min-height: 80px; }

      .page-footer {
        display: block;
        padding: 1.5rem 1rem 2.5rem;
        text-align: center;
      }

      .page-footer p {
        font-size: 0.75rem;
        color: #aaa;
        line-height: 1.8;
        margin-bottom: 1rem;
        font-family: 'Noto Sans KR', sans-serif;
      }

      .page-footer em { font-style: normal; color: var(--green); font-weight: 700; }

      .page-footer a {
        display: inline-block;
        width: 100%;
        padding: 0.9rem;
        background: var(--green);
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        font-family: 'Noto Sans KR', sans-serif;
        border-radius: 8px;
        text-decoration: none;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">verde<span>.</span>verde</a>
  <div class="header-sep"></div>
  <span class="header-title">폰트 미리보기</span>
</header>

<div class="ctrl-bar">
  <div class="ctrl-input-wrap">
    <input class="ctrl-input" id="main-input" type="text" placeholder="문구를 입력하고 폰트를 미리보세요">
    <svg class="ctrl-input-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </div>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">크기</span>
  <div class="size-control">
    <button class="size-btn" id="btn-minus" type="button">−</button>
    <input class="size-input" id="size-input" type="number" value="30" min="10" max="120">
    <button class="size-btn" id="btn-plus" type="button">+</button>
  </div>
</div>

<div class="cards-wrap">
  <div class="cards-grid" id="cards-grid"></div>
</div>

<div class="page-footer">
  <p>
    폰트 종류에 따라 동일한 글자 크기로 제작하더라도<br>
    <em>글자마다 높낮이가 다르거나 수평이 맞지 않는 특성</em>이 있으며,<br>
    불량이 아닌 점 참고 부탁드립니다.
  </p>
  <a href="index.html">폰트 선택 가이드 보러가기</a>
</div>

<script>
  /* 폰트 목록 — 이름 노출 없이 내부용으로만 */
  const FONTS = [
    { family: "'f1', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f2', sans-serif", weight: 400 },
    { family: "'f3', sans-serif", weight: 400 },
    { family: "'f4', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f5', sans-serif", weight: 400, stroke: { color: '#fff', width: '0.3pt' } },
    { family: "'f6', sans-serif", weight: 400, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f7', sans-serif", weight: 700, stroke: { color: '#000', width: '0.2pt' } },
    { family: "'f8', sans-serif", weight: 700 },
  ];

  const DEFAULT = '가나다라마바사';
  let fontSize = 30;

  const grid      = document.getElementById('cards-grid');
  const mainInput = document.getElementById('main-input');
  const sizeInput = document.getElementById('size-input');
  const cardTextEls = [];

  /* 카드 생성 */
  FONTS.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'font-card';

    let badgeHtml = '';
    if (f.stroke) {
      const label = f.stroke.color === '#fff'
        ? `흰 테두리 ${f.stroke.width}`
        : `검정 테두리 ${f.stroke.width}`;
      badgeHtml = `<span class="card-badge">${label}</span>`;
    }

    card.innerHTML = `
      <div class="card-head">
        <span class="card-num">${i + 1}번</span>
        ${badgeHtml}
      </div>
      <div class="card-divider"></div>
      <div class="card-preview">
        <div class="card-text" contenteditable="true" spellcheck="false"></div>
      </div>`;

    grid.appendChild(card);

    const el = card.querySelector('.card-text');
    el.style.fontFamily  = f.family;
    el.style.fontWeight  = f.weight;
    el.style.fontSize    = fontSize + 'px';
    if (f.stroke) el.style.webkitTextStroke = f.stroke.width + ' ' + f.stroke.color;
    el.textContent = DEFAULT;
    cardTextEls.push(el);
  });

  function setAllText(val) {
    const t = val.trim() || DEFAULT;
    cardTextEls.forEach(el => { el.textContent = t; });
  }

  function setAllSize(s) {
    cardTextEls.forEach(el => { el.style.fontSize = s + 'px'; });
  }

  mainInput.addEventListener('input', () => setAllText(mainInput.value));

  function changeSize(delta) {
    fontSize = Math.min(120, Math.max(10, fontSize + delta));
    sizeInput.value = fontSize;
    setAllSize(fontSize);
  }

  document.getElementById('btn-minus').addEventListener('click', () => changeSize(-2));
  document.getElementById('btn-plus').addEventListener('click',  () => changeSize(+2));

  sizeInput.addEventListener('change', () => {
    fontSize = Math.min(120, Math.max(10, parseInt(sizeInput.value) || 30));
    sizeInput.value = fontSize;
    setAllSize(fontSize);
  });
</script>

</body>
</html>
