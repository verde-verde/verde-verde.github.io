<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폰트 테스트 — Verde Verde</title>
  <style>
    @font-face { font-family: 'Cafe24';          src: url('Fonts/Cafe24.ttf');             font-weight: 400; }
    @font-face { font-family: 'DOS Saemmul';     src: url('Fonts/DOSSaemmul.ttf');         font-weight: 400; }
    @font-face { font-family: 'NEXON Lv2 Gothic'; src: url('Fonts/NEXON Lv2 Gothic.ttf'); font-weight: 400; }
    @font-face { font-family: 'NanumSquare AC';  src: url('Fonts/NanumSquare_acR.ttf');    font-weight: 400; }
    @font-face { font-family: 'NanumSquare AC';  src: url('Fonts/NanumSquare_acB.ttf');    font-weight: 700; }
    @font-face { font-family: 'PF Stardust';     src: url('Fonts/PF_Stardust.ttf');        font-weight: 400; }
    @font-face { font-family: 'Ycomputer';       src: url('Fonts/Ycomputer.ttf');           font-weight: 400; }
  </style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid #222;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }

    header a:hover { color: #fff; }

    header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 260px;
      background: #111;
      border-right: 1px solid #222;
      padding: 1.5rem 1.2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .ctrl-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .ctrl-group select,
    .ctrl-group input[type="color"],
    .ctrl-group textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #f0f0f0;
      padding: 0.5rem 0.7rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .ctrl-group select:focus,
    .ctrl-group textarea:focus {
      border-color: #2ecc71;
    }

    .ctrl-group textarea {
      resize: vertical;
      min-height: 90px;
      font-family: inherit;
      line-height: 1.5;
    }

    /* Slider row */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #2ecc71;
      cursor: pointer;
    }

    .slider-row span {
      font-size: 0.85rem;
      color: #aaa;
      min-width: 48px;
      text-align: right;
    }

    /* Color pair */
    .color-pair {
      display: flex;
      gap: 0.7rem;
    }

    .color-item {
      flex: 1;
    }

    .color-item label {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 0.3rem;
      display: block;
    }

    .color-item input[type="color"] {
      padding: 0.2rem;
      height: 36px;
      cursor: pointer;
    }

    /* Weight chips */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .chip {
      padding: 0.3rem 0.7rem;
      border-radius: 99px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .chip.active,
    .chip:hover {
      background: #2ecc71;
      color: #000;
      border-color: #2ecc71;
    }

    /* Align buttons */
    .align-group {
      display: flex;
      gap: 0.4rem;
    }

    .align-btn {
      flex: 1;
      padding: 0.4rem;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    .align-btn.active,
    .align-btn:hover {
      background: #2ecc71;
      color: #000;
      border-color: #2ecc71;
    }

    /* ── Main preview ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 3rem;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    #preview-text {
      width: 100%;
      max-width: 900px;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
      transition: font-size 0.1s, letter-spacing 0.1s, line-height 0.1s;
      outline: none;
      min-height: 4rem;
    }

    /* Font scale bar at bottom */
    .info-bar {
      display: flex;
      gap: 1.5rem;
      padding: 0.7rem 2rem;
      border-top: 1px solid #222;
      background: #111;
      font-size: 0.8rem;
      color: #555;
    }

    .info-bar span b {
      color: #aaa;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <a href="index.html">← 홈</a>
  <h2>폰트 테스트</h2>
</header>

<div class="layout">

  <!-- ── Sidebar controls ── -->
  <aside class="sidebar">

    <!-- 텍스트 입력 -->
    <div class="ctrl-group">
      <label>테스트 텍스트</label>
      <textarea id="input-text" rows="4">가나다라마바사아자차카타파하
ABCDEFGHIJKLMNOPQRSTUVWXYZ
abcdefghijklmnopqrstuvwxyz
0123456789 !@#$%^&*()</textarea>
    </div>

    <!-- 폰트 선택 -->
    <div class="ctrl-group">
      <label>폰트</label>
      <select id="font-select">
        <option value="'Cafe24', sans-serif">Cafe24</option>
        <option value="'DOS Saemmul', monospace">DOS Saemmul</option>
        <option value="'NEXON Lv2 Gothic', sans-serif">NEXON Lv2 Gothic</option>
        <option value="'NanumSquare AC', sans-serif">NanumSquare AC</option>
        <option value="'PF Stardust', sans-serif">PF Stardust</option>
        <option value="'Ycomputer', monospace">Ycomputer</option>
      </select>
    </div>

    <!-- 폰트 크기 -->
    <div class="ctrl-group">
      <label>크기</label>
      <div class="slider-row">
        <input type="range" id="font-size" min="8" max="200" value="48">
        <span id="font-size-val">48px</span>
      </div>
    </div>

    <!-- 자간 -->
    <div class="ctrl-group">
      <label>자간 (letter-spacing)</label>
      <div class="slider-row">
        <input type="range" id="letter-spacing" min="-10" max="30" value="0" step="0.5">
        <span id="letter-spacing-val">0px</span>
      </div>
    </div>

    <!-- 행간 -->
    <div class="ctrl-group">
      <label>행간 (line-height)</label>
      <div class="slider-row">
        <input type="range" id="line-height" min="0.8" max="4" value="1.5" step="0.05">
        <span id="line-height-val">1.5</span>
      </div>
    </div>

    <!-- 굵기 -->
    <div class="ctrl-group">
      <label>굵기 (font-weight)</label>
      <div class="chip-group" id="weight-group">
        <span class="chip" data-weight="100">100</span>
        <span class="chip" data-weight="200">200</span>
        <span class="chip" data-weight="300">300</span>
        <span class="chip active" data-weight="400">400</span>
        <span class="chip" data-weight="500">500</span>
        <span class="chip" data-weight="600">600</span>
        <span class="chip" data-weight="700">700</span>
        <span class="chip" data-weight="800">800</span>
        <span class="chip" data-weight="900">900</span>
      </div>
    </div>

    <!-- 기울임 -->
    <div class="ctrl-group">
      <label>스타일</label>
      <div class="chip-group">
        <span class="chip active" id="style-normal" onclick="setStyle('normal')">Normal</span>
        <span class="chip" id="style-italic" onclick="setStyle('italic')">Italic</span>
      </div>
    </div>

    <!-- 정렬 -->
    <div class="ctrl-group">
      <label>정렬</label>
      <div class="align-group">
        <button class="align-btn active" onclick="setAlign('left')" title="왼쪽">&#9664;</button>
        <button class="align-btn" onclick="setAlign('center')" title="가운데">&#9632;</button>
        <button class="align-btn" onclick="setAlign('right')" title="오른쪽">&#9654;</button>
      </div>
    </div>

    <!-- 색상 -->
    <div class="ctrl-group">
      <label>색상</label>
      <div class="color-pair">
        <div class="color-item">
          <label>글자색</label>
          <input type="color" id="text-color" value="#f0f0f0">
        </div>
        <div class="color-item">
          <label>배경색</label>
          <input type="color" id="bg-color" value="#0f0f0f">
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Preview ── -->
  <div class="main">
    <div class="preview-area" id="preview-bg">
      <div id="preview-text" contenteditable="true"></div>
    </div>

    <div class="info-bar">
      <span>폰트: <b id="info-font">Cafe24</b></span>
      <span>크기: <b id="info-size">48px</b></span>
      <span>굵기: <b id="info-weight">400</b></span>
    </div>
  </div>

</div>

<script>
  const preview = document.getElementById('preview-text');
  const previewBg = document.getElementById('preview-bg');

  let state = {
    font: "'Cafe24', sans-serif",
    size: 48,
    letterSpacing: 0,
    lineHeight: 1.5,
    weight: 400,
    style: 'normal',
    align: 'left',
    color: '#f0f0f0',
    bg: '#0f0f0f',
  };

  function applyAll() {
    preview.style.fontFamily = state.font;
    preview.style.fontSize = state.size + 'px';
    preview.style.letterSpacing = state.letterSpacing + 'px';
    preview.style.lineHeight = state.lineHeight;
    preview.style.fontWeight = state.weight;
    preview.style.fontStyle = state.style;
    preview.style.textAlign = state.align;
    preview.style.color = state.color;
    previewBg.style.background = state.bg;

    // info bar
    const fontName = document.getElementById('font-select').options[document.getElementById('font-select').selectedIndex].text;
    document.getElementById('info-font').textContent = fontName;
    document.getElementById('info-size').textContent = state.size + 'px';
    document.getElementById('info-weight').textContent = state.weight;
  }

  // 텍스트 입력 → 미리보기 동기화
  const inputText = document.getElementById('input-text');
  inputText.addEventListener('input', () => {
    preview.textContent = inputText.value;
  });
  // 미리보기 직접 편집 → 사이드바 동기화
  preview.addEventListener('input', () => {
    inputText.value = preview.textContent;
  });
  preview.textContent = inputText.value;

  // 폰트 선택
  document.getElementById('font-select').addEventListener('change', e => {
    state.font = e.target.value;
    applyAll();
  });

  // 슬라이더들
  function bindSlider(id, valId, stateKey, suffix, decimals) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(valId);
    el.addEventListener('input', () => {
      state[stateKey] = parseFloat(el.value);
      valEl.textContent = parseFloat(el.value).toFixed(decimals) + suffix;
      applyAll();
    });
  }
  bindSlider('font-size', 'font-size-val', 'size', 'px', 0);
  bindSlider('letter-spacing', 'letter-spacing-val', 'letterSpacing', 'px', 1);
  bindSlider('line-height', 'line-height-val', 'lineHeight', '', 2);

  // 굵기 칩
  document.getElementById('weight-group').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#weight-group .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.weight = parseInt(chip.dataset.weight);
    applyAll();
  });

  // 스타일
  function setStyle(s) {
    state.style = s;
    document.getElementById('style-normal').classList.toggle('active', s === 'normal');
    document.getElementById('style-italic').classList.toggle('active', s === 'italic');
    applyAll();
  }

  // 정렬
  function setAlign(a) {
    state.align = a;
    document.querySelectorAll('.align-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    applyAll();
  }

  // 색상
  document.getElementById('text-color').addEventListener('input', e => {
    state.color = e.target.value;
    applyAll();
  });
  document.getElementById('bg-color').addEventListener('input', e => {
    state.bg = e.target.value;
    applyAll();
  });

  applyAll();
</script>

</body>
</html>
